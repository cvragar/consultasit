        <h1>Consultes IT — Plataforma de normativa d'Incapacitat Temporal per a metges</h1>
        <p>Plataforma especialitzada en normativa d'Incapacitat Temporal (IT) per a professionals sanitaris. Resol dubtes sobre processos d'IT, normativa estatal i autonòmica, casos especials i situacions complexes.</p>
        <h2>Funcionalitats principals</h2>
        <ul>
          <li><strong>Consulta amb IA especialitzada</strong> — Xat intel·ligent amb respostes basades en normativa vigent (LGSS, RD 625/2014, RD 1060/2022).</li>
          <li><strong>Casos especials d'IT</strong> — Menstruació incapacitant, interrupció de l'embaràs, donació d'òrgans, baixes retroactives, pluriocupació i més.</li>
          <li><strong>Documentació i normativa</strong> — Reial Decret 625/2014, RD 1060/2022, guies de l'ICS, protocols del Departament de Salut de Catalunya.</li>
          <li><strong>Calculadora de durada d'IT</strong> — Temps estàndard basats en el Manual de Tiempos Óptimos de l'INSS amb factors de correcció per ocupació (CNO-11).</li>
          <li><strong>Reclamacions</strong> — Guia per a reclamacions d'alta mèdica, determinació de contingències i recursos davant l'INSS i ICAM.</li>
        </ul>
        <h2>Contingències professionals</h2>
        <p>Informació detallada sobre <strong>accidents de treball</strong> (art. 156 LGSS), <strong>malalties professionals</strong> (art. 157 LGSS, RD 1299/2006) i <strong>contingència comuna</strong> (art. 169 LGSS). Inclou taula comparativa de prestacions, gestió i normativa aplicable.</p>
        <h2>Què inclou la plataforma?</h2>
        <p>Normativa actualitzada (RD 625/2014, documentació del Departament de Salut, guies de l'ICS), casos especials (menstruació incapacitant, IVE, gestació, donació d'òrgans), procediments (gestió de baixes, pròrrogues, incapacitat permanent) i eines pràctiques (calculadora, cercador, xat amb IA).</p>
